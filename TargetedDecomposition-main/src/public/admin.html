<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TDE — Targeted Decomposition Engine</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#08090d;--card:#0f1118;--hover:#161924;--input:#0a0c12;--border:#1a1d2e;--border2:#252840;--green:#22c55e;--blue:#3b82f6;--amber:#f59e0b;--red:#ef4444;--purple:#a855f7;--cyan:#06b6d4;--text:#e2e4f0;--muted:#8b8fa8;--dim:#454766;--r:10px;--rs:6px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
.mono{font-family:'JetBrains Mono',monospace}
.shell{display:flex;min-height:100vh}
.sidebar{width:256px;flex-shrink:0;background:var(--card);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:0}
.brand{padding:20px 20px 16px;border-bottom:1px solid var(--border)}
.brand h1{font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px;letter-spacing:-.2px}
.pulse{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 8px rgba(34,197,94,.5);animation:pulse 2s ease infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.brand .sub{font-size:11px;color:var(--dim);font-family:'JetBrains Mono',monospace;margin-top:3px}
.nav-grp{padding:12px 10px 4px}
.nav-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.4px;color:var(--dim);padding:0 8px 6px}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:var(--rs);color:var(--muted);cursor:pointer;font-size:13px;font-weight:500;transition:all .12s}
.nav-item:hover{background:var(--hover);color:var(--text)}
.nav-item.active{background:rgba(59,130,246,.12);color:var(--blue)}
.nav-item .ico{font-size:15px;width:18px;text-align:center}
.badge{margin-left:auto;font-size:10px;font-family:'JetBrains Mono',monospace;background:var(--hover);padding:2px 6px;border-radius:99px;color:var(--dim)}
.main{flex:1;padding:28px 32px;overflow-y:auto;max-height:100vh}
.ph{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px}
.ph h2{font-size:20px;font-weight:700;letter-spacing:-.3px}
.ph .sub{color:var(--muted);font-size:12px;margin-top:3px}
.ha{display:flex;gap:8px;align-items:center}
.grid4{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin-bottom:24px}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;transition:border-color .2s}
.kpi:hover{border-color:var(--border2)}
.kpi .lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--dim);margin-bottom:7px}
.kpi .val{font-size:26px;font-weight:700;font-family:'JetBrains Mono',monospace;letter-spacing:-1px}
.kpi .sub{font-size:11px;color:var(--muted);margin-top:3px}
.kpi.green .val{color:var(--green)}.kpi.blue .val{color:var(--blue)}.kpi.amber .val{color:var(--amber)}.kpi.purple .val{color:var(--purple)}.kpi.cyan .val{color:var(--cyan)}
.panel{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:18px}
.panel-hdr{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.panel-hdr h3{font-size:13px;font-weight:700}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:9px 18px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--dim);border-bottom:1px solid var(--border);background:rgba(0,0,0,.2)}
td{padding:11px 18px;font-size:12px;border-bottom:1px solid var(--border);color:var(--muted)}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--hover)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--rs);font-size:12px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;border:1px solid var(--border);background:var(--card);color:var(--text);transition:all .12s}
.btn:hover{background:var(--hover);border-color:var(--border2)}
.btn.primary{background:var(--blue);border-color:var(--blue);color:#fff}.btn.primary:hover{background:#2563eb}
.btn.green{background:var(--green);border-color:var(--green);color:#000}.btn.green:hover{opacity:.9}
.btn.danger{background:transparent;border-color:#f87171;color:#f87171}.btn.danger:hover{background:#7f1d1d;border-color:#fca5a5;color:#fff}
.btn.sm{padding:4px 9px;font-size:11px}
.btn:disabled{opacity:.4;cursor:not-allowed}
.ig{margin-bottom:13px}
.ig label{display:block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--dim);margin-bottom:5px}
input[type=text],input[type=url],input[type=password],select,textarea{width:100%;padding:9px 12px;background:var(--input);border:1px solid var(--border);border-radius:var(--rs);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:12px;outline:none;transition:border-color .12s;resize:vertical}
input:focus,select:focus,textarea:focus{border-color:var(--blue)}
textarea{min-height:80px}
.log{background:var(--input);border:1px solid var(--border);border-radius:var(--rs);padding:14px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);max-height:280px;overflow-y:auto;line-height:1.9;white-space:pre-wrap}
.ok{color:var(--green)}.err{color:var(--red)}.info{color:var(--blue)}.warn{color:var(--amber)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.tag{display:inline-block;padding:2px 7px;border-radius:99px;font-size:10px;font-weight:600;font-family:'JetBrains Mono',monospace}
.tag.green{background:rgba(34,197,94,.12);color:var(--green)}
.tag.blue{background:rgba(59,130,246,.12);color:var(--blue)}
.tag.amber{background:rgba(245,158,11,.12);color:var(--amber)}
.tag.red{background:rgba(239,68,68,.12);color:var(--red)}
.tag.purple{background:rgba(168,85,247,.12);color:var(--purple)}
.tag.cyan{background:rgba(6,182,212,.12);color:var(--cyan)}
.dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:5px}
.dot.on{background:var(--green);box-shadow:0 0 5px rgba(34,197,94,.4)}
.dot.off{background:var(--red)}.dot.warn{background:var(--amber)}
.backdrop{position:fixed;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(4px);z-index:100;display:flex;align-items:center;justify-content:center}
.modal{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:26px;width:520px;max-width:92vw;max-height:85vh;overflow-y:auto}
.modal h3{font-size:15px;font-weight:700;margin-bottom:18px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:18px}
.toasts{position:fixed;bottom:20px;right:20px;z-index:999;display:flex;flex-direction:column;gap:7px}
.toast{padding:10px 18px;border-radius:var(--rs);font-size:12px;font-weight:500;animation:slideIn .25s ease;box-shadow:0 6px 20px rgba(0,0,0,.4)}
.toast.success{background:var(--green);color:#000}.toast.error{background:var(--red);color:#fff}.toast.info{background:var(--blue);color:#fff}
@keyframes slideIn{from{transform:translateX(80px);opacity:0}to{transform:translateX(0);opacity:1}}
.dropzone{border:2px dashed var(--border);border-radius:var(--r);padding:32px;text-align:center;cursor:pointer;transition:all .15s}
.dropzone:hover,.dropzone.over{border-color:var(--blue);background:rgba(59,130,246,.05)}
.dropzone .ico{font-size:32px;margin-bottom:10px}
.dropzone p{color:var(--muted);font-size:13px}
.dropzone .hint{font-size:11px;color:var(--dim);margin-top:4px}
.pbar{height:3px;background:var(--border);border-radius:99px;overflow:hidden;margin:6px 0}
.pbar-fill{height:100%;background:var(--blue);transition:width .3s ease;border-radius:99px}
.spinner{width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .6s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:40px;color:var(--dim)}
.empty .ico{font-size:36px;margin-bottom:10px}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.atom-card{background:var(--input);border:1px solid var(--border);border-radius:var(--rs);padding:12px 14px;margin-bottom:8px}
.atom-text{font-size:13px;color:var(--text);line-height:1.5;margin-bottom:8px}
.atom-tags{display:flex;flex-wrap:wrap;gap:4px}
@media(max-width:768px){.sidebar{display:none}.main{padding:16px}.g2{grid-template-columns:1fr}}

.col-grid{display:flex;flex-wrap:wrap;gap:6px}
.col-chip{display:flex;align-items:center;gap:6px;padding:6px 12px;background:var(--input);border:1.5px solid var(--border);border-radius:8px;font-size:12px;cursor:pointer;transition:all .15s;user-select:none}
.col-chip:hover{border-color:var(--blue);background:rgba(59,130,246,.04)}
.col-chip:has(input:checked){border-color:var(--blue);background:rgba(59,130,246,.1);box-shadow:0 0 0 1px rgba(59,130,246,.2)}
.col-chip input{accent-color:var(--blue)}
.col-chip-name{font-weight:600;color:var(--text)}
.col-chip-tpl{font-size:9px;color:var(--purple);background:rgba(168,85,247,.1);padding:1px 6px;border-radius:99px}
.col-chip-atoms{font-size:10px;color:var(--dim);font-family:'JetBrains Mono',monospace}
.target-bar{margin-top:12px;padding:8px 14px;background:rgba(59,130,246,.06);border:1px solid rgba(59,130,246,.15);border-radius:var(--rs);font-size:12px;font-weight:500;color:var(--blue);align-items:center;gap:8px}
.target-ico{font-size:14px;opacity:.6}
.ingest-sections{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.ingest-sections .panel{margin-bottom:0}
.panel-hint{font-size:11px;color:var(--dim);font-weight:400}
@media(max-width:900px){.ingest-sections{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="shell" id="app"></div>
<div class="toasts" id="toasts"></div>

<script>
const API = window.location.origin;
let KEY = localStorage.getItem('tde_key') || '';
let view = 'overview';
let state = {
  health: null, collections: [], templates: [], loading: true,
  selectedCol: null, colDetail: null, colSources: [], colAtoms: [],
  logs: [], searchResults: [], askResult: null,
};

async function api(path, opts = {}) {
  const h = { 'Content-Type': 'application/json' };
  if (KEY) h['x-api-key'] = KEY;
  const r = await fetch(`${API}${path}`, { ...opts, headers: { ...h, ...(opts.headers || {}) }, credentials: 'same-origin' });
  if (!r.ok) { const t = await r.text(); throw new Error(`${r.status}: ${t.slice(0, 200)}`); }
  return r.json();
}

async function apiForm(path, formData) {
  const h = {};
  if (KEY) h['x-api-key'] = KEY;
  const r = await fetch(`${API}${path}`, { method: 'POST', headers: h, body: formData, credentials: 'same-origin' });
  if (!r.ok) { const t = await r.text(); throw new Error(`${r.status}: ${t.slice(0, 200)}`); }
  return r.json();
}

function log(msg, type = '') {
  const ts = new Date().toLocaleTimeString();
  state.logs.unshift({ ts, msg, type });
  if (state.logs.length > 300) state.logs = state.logs.slice(0, 300);
}

function toast(msg, type = 'info') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  document.getElementById('toasts').appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

async function loadAll() {
  state.loading = true; render();
  try {
    const [health, collections, templates] = await Promise.all([api('/health'), api('/collections').catch(() => []), api('/templates').catch(() => [])]);
    state.health = health; state.collections = collections; state.templates = templates;
    log('Connected to TDE', 'ok');
  } catch (err) { log(`Connection failed: ${err.message}`, 'err'); toast('Connection failed', 'error'); }
  state.loading = false; render();
}

async function loadCollection(id) {
  try {
    const [detail, sources] = await Promise.all([api(`/collections/${id}`), api(`/sources/${id}`)]);
    state.colDetail = detail; state.colSources = sources;
    render();
  } catch (err) { log(`Failed: ${err.message}`, 'err'); }
}

async function refreshCollection(id) {
  try {
    log('Refreshing ' + id + '...', 'ok');
    await loadAll();
    toast('Refreshed', 'success');
  } catch (e) { log('Refresh failed: ' + e.message, 'err'); toast('Refresh failed', 'error'); }
}

async function confirmDeleteCollection(id) {
  const _c = (state.collections || []).find(x => x.id === id);
  const name = _c ? _c.name : id;
  const confirmed = confirm('Delete collection "' + name + '"?\n\nThis permanently removes ALL atoms, sources, and metadata in this collection. This cannot be undone.');
  if (!confirmed) return;
  const typed = prompt('Type the collection ID to confirm delete:\n(' + id + ')');
  if (typed !== id) { toast('ID mismatch. Delete cancelled.', 'error'); return; }
  try {
    log('Deleting ' + id + '...', 'ok');
    await api('/collections/' + encodeURIComponent(id), { method: 'DELETE' });
    log('Deleted: ' + name, 'ok');
    toast('Collection deleted', 'success');
    if (state.selectedCol === id) { state.selectedCol = null; state.colDetail = null; view = 'collections'; }
    await loadAll();
  } catch (e) { log('Delete failed: ' + e.message, 'err'); toast('Delete failed: ' + e.message, 'error'); }
}

async function retrySource(collectionId, sourceId) {
  try {
    log('Retrying ' + sourceId + '...', 'ok');
    await api('/retry/' + encodeURIComponent(collectionId) + '/' + encodeURIComponent(sourceId), { method: 'POST' });
    toast('Retry queued', 'success');
    setTimeout(() => { if (state.selectedCol === collectionId) loadCollection(collectionId); }, 2000);
  } catch (e) { log('Retry failed: ' + e.message, 'err'); toast('Retry failed: ' + e.message, 'error'); }
}

async function confirmDeleteSource(collectionId, sourceId) {
  const src = (state.colSources || []).find(s => s.id === sourceId);
  const title = src ? (src.title || sourceId) : sourceId;
  if (!confirm('Delete source "' + title + '"?\n\nThis removes all atoms from this source but keeps the collection. Cannot be undone.')) return;
  try {
    log('Deleting source ' + sourceId + '...', 'ok');
    await api('/sources/' + encodeURIComponent(collectionId) + '/' + encodeURIComponent(sourceId), { method: 'DELETE' });
    toast('Source deleted', 'success');
    await loadCollection(collectionId);
    await loadAll();
  } catch (e) { log('Delete failed: ' + e.message, 'err'); toast('Delete failed: ' + e.message, 'error'); }
}

async function createCollection(id, name, desc, templateId) {
  try {
    await api('/collections', { method: 'POST', body: JSON.stringify({ id, name, description: desc, templateId }) });
    log(`Created: ${name} (template: ${templateId})`, 'ok'); toast('Collection created!', 'success'); await loadAll();
  } catch (e) { log(`Failed: ${e.message}`, 'err'); toast('Failed', 'error'); }
}

async function ingestURLs(collectionId, type, urlsText) {
  const urls = urlsText.split('\n').map(u => u.trim()).filter(u => u.length > 5);
  if (!urls.length) { toast('No URLs found', 'error'); return; }
  if (urls.length === 1) {
    log(`Ingesting ${type}: ${urls[0].slice(0, 60)}...`, 'info');
    toast(`Ingesting 1 ${type} URL...`, 'info');
    try {
      await api('/ingest', { method: 'POST', body: JSON.stringify({ collectionId, type, input: urls[0] }) });
      log(`Queued: ${urls[0].slice(0, 60)}`, 'ok'); toast('Queued for ingestion!', 'success');
    } catch (e) { log(`Error: ${e.message}`, 'err'); toast('Failed', 'error'); }
  } else {
    const items = urls.map(u => ({ type, input: u }));
    log(`Batch ingesting ${items.length} ${type} URLs...`, 'info');
    toast(`Queuing ${items.length} URLs...`, 'info');
    try {
      await api('/ingest/batch', { method: 'POST', body: JSON.stringify({ collectionId, items }) });
      log(`Queued ${items.length} items`, 'ok'); toast(`${items.length} items queued!`, 'success');
    } catch (e) { log(`Error: ${e.message}`, 'err'); toast('Failed', 'error'); }
  }
  closeModal();
  setTimeout(() => { if (state.selectedCol === collectionId) loadCollection(collectionId); }, 3000);
}

async function ingestChannel(collectionId, channelUrl, maxVideos) {
  log(`Channel ingest: ${channelUrl} (max ${maxVideos})...`, 'info');
  toast('Channel ingest started!', 'info');
  try {
    await api('/ingest/channel', { method: 'POST', body: JSON.stringify({ collectionId, channelUrl, maxVideos: parseInt(maxVideos) || 50 }) });
    log(`Channel queued: ${channelUrl}`, 'ok'); toast('Channel queued!', 'success');
  } catch (e) { log(`Error: ${e.message}`, 'err'); toast('Failed', 'error'); }
  closeModal();
}

async function uploadFiles(collectionId, files, context) {
  const fd = new FormData();
  for (const f of files) fd.append('files', f);
  if (context) fd.append('context', context);
  log(`Uploading ${files.length} file(s)...`, 'info');
  toast(`Uploading ${files.length} file(s)...`, 'info');
  try {
    await apiForm(`/upload/${collectionId}`, fd);
    log(`${files.length} file(s) queued for processing`, 'ok'); toast('Upload complete!', 'success');
  } catch (e) { log(`Upload error: ${e.message}`, 'err'); toast('Upload failed', 'error'); }
  closeModal();
  setTimeout(() => { if (state.selectedCol === collectionId) loadCollection(collectionId); }, 4000);
}

async function runSearch(collectionId, q, persona, stage) {
  log(`Searching "${q}"...`, 'info');
  try {
    let url = `/search/${collectionId}?q=${encodeURIComponent(q)}&top_k=10`;
    if (persona) url += `&persona=${encodeURIComponent(persona)}`;
    if (stage)   url += `&buying_stage=${encodeURIComponent(stage)}`;
    const r = await api(url);
    state.searchResults = r.results || [];
    log(`Found ${state.searchResults.length} atoms`, 'ok');
    render();
  } catch (e) { log(`Search failed: ${e.message}`, 'err'); }
}

async function runAsk(collectionId, question) {
  log(`Asking: "${question}"`, 'info');
  document.getElementById('ask-result')?.remove();
  try {
    const r = await api(`/ask/${collectionId}`, { method: 'POST', body: JSON.stringify({ question }) });
    state.askResult = r;
    log('Answer received', 'ok'); render();
  } catch (e) { log(`Ask failed: ${e.message}`, 'err'); }
}

function render() {
  document.getElementById('app').innerHTML = `
    ${sidebar()}
    <div class="main">
      ${view === 'overview'    ? pageOverview()    : ''}
      ${view === 'collections' ? pageCollections() : ''}
      ${view === 'detail'      ? pageDetail()      : ''}
      ${view === 'ingest'      ? pageIngest()      : ''}
      ${view === 'search'      ? pageSearch()      : ''}
      ${view === 'settings'    ? pageSettings()    : ''}
      ${view === 'logs'        ? pageLogs()        : ''}
    </div>`;
  attachHandlers();
}

function sidebar() {
  const h = state.health || {};
  return `<div class="sidebar">
    <div class="brand">
      <h1><span class="pulse"></span> TDE</h1>
      <div class="sub">Targeted Decomposition Engine</div>
    </div>
    <div class="nav-grp">
      <div class="nav-lbl">Workspace</div>
      ${nav('overview',    '◎', 'Overview')}
      ${nav('collections', '◫', 'Collections', state.collections.length)}
      ${nav('ingest',      '⬆', 'Ingest')}
      ${nav('search',      '⌕', 'Search & Ask')}
    </div>
    <div class="nav-grp">
      <div class="nav-lbl">System</div>
      ${nav('settings', '⚙', 'Settings')}
      ${nav('logs',     '▤', 'Activity Log', state.logs.length)}
    </div>
  </div>`;
}

function nav(v, ico, label, badge) {
  return `<div class="nav-item ${view === v ? 'active' : ''}" onclick="go('${v}')">
    <span class="ico">${ico}</span> ${label}
    ${badge !== undefined ? `<span class="badge">${badge}</span>` : ''}
  </div>`;
}

function pageOverview() {
  const h = state.health || {};
  const totalAtoms = state.collections.reduce((s, c) => s + ((c.stats||{}).atomCount||0), 0);
  const totalSources = state.collections.reduce((s, c) => s + ((c.stats||{}).sourceCount||0), 0);
  return `
  <div class="ph">
    <div><h2>System Overview</h2><div class="sub">Targeted Decomposition Engine — Feed it anything.</div></div>
    <div class="ha"><button class="btn" onclick="loadAll()">↻ Refresh</button></div>
  </div>
  <div class="grid4">
    <div class="kpi green"><div class="lbl">Status</div><div class="val" style="font-size:18px">${h.status === 'ok' ? '● LIVE' : '○ DOWN'}</div><div class="sub">Port ${window.location.port || '443'}</div></div>
    <div class="kpi blue"><div class="lbl">Collections</div><div class="val">${state.collections.length}</div><div class="sub">${totalSources} sources</div></div>
    <div class="kpi purple"><div class="lbl">Total Atoms</div><div class="val">${totalAtoms.toLocaleString()}</div><div class="sub">Indexed & tagged</div></div>
    <div class="kpi cyan"><div class="lbl">Vector Store</div><div class="val" style="font-size:16px">${h.qdrantConnected ? '● QDRANT' : '○ SQLite'}</div><div class="sub">${h.qdrantConnected ? 'Hybrid search' : 'Local fallback'}</div></div>
  </div>
  <div class="g2">
    <div class="panel">
      <div class="panel-hdr"><h3>Services</h3></div>
      <table>
        <tr><td><span class="dot ${h.hasOpenRouter?'on':'off'}"></span>OpenRouter (LLM)</td><td style="text-align:right"><span class="mono" style="font-size:11px">${h.hasOpenRouter?'Connected':'Missing'}</span></td></tr>
        <tr><td><span class="dot ${h.hasYouTubeAPI?'on':'off'}"></span>YouTube API</td><td style="text-align:right"><span class="mono" style="font-size:11px">${h.hasYouTubeAPI?'Connected':'Missing'}</span></td></tr>
        <tr><td><span class="dot ${h.hasGroq?'on':'off'}"></span>Groq Whisper</td><td style="text-align:right"><span class="mono" style="font-size:11px">${h.hasGroq?'Connected':'Missing'}</span></td></tr>

function attachHandlers() {
  const dz = document.getElementById('dropzone');
  if (dz) {
    dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('over'); });
    dz.addEventListener('dragleave', () => dz.classList.remove('over'));
    dz.addEventListener('drop', e => {
      e.preventDefault(); dz.classList.remove('over');
      handleFiles(Array.from(e.dataTransfer.files));
    });
  }
}

function updateIngestTarget() {
  const cols = getSelectedCollections();
  const bar = document.getElementById('ingest-target-bar');
  const text = document.getElementById('ingest-target-text');
  if (!bar || !text) return;
  if (cols.length === 0) {
    bar.style.display = 'none';
  } else {
    bar.style.display = 'flex';
    const names = cols.map(id => { const c = state.collections.find(x => x.id === id); return c ? c.name : id; });
    text.textContent = 'Ingesting into: ' + names.join(' + ');
  }
}

function doURLIngest() {
  const cols = getSelectedCollections();
  if (!cols.length) { toast('Select at least one collection', 'error'); return; }
  const raw = val('url-input');
  if (!raw) { toast('Enter at least one URL', 'error'); return; }
  const urls = raw.split('\n').map(u => u.trim()).filter(u => u.length > 5);
  const crawl = document.getElementById('url-crawl')?.checked;
  const maxPages = parseInt(val('url-crawl-max')) || 50;

  // Separate YouTube URLs from web URLs
  const ytUrls = urls.filter(u => u.includes('youtube.com') || u.includes('youtu.be'));
  const webUrls = urls.filter(u => !u.includes('youtube.com') && !u.includes('youtu.be'));

  for (const col of cols) {
    // YouTube URLs
    if (ytUrls.length === 1) {
      api('/ingest', { method: 'POST', body: JSON.stringify({ collectionId: col, type: 'youtube', input: ytUrls[0] }) })
        .then(() => { log('YouTube queued → ' + col, 'ok'); toast('YouTube queued!', 'success'); })
        .catch(e => { log('Error: ' + e.message, 'err'); });
    } else if (ytUrls.length > 1) {
      const items = ytUrls.map(u => ({ type: 'youtube', input: u }));
      api('/ingest/batch', { method: 'POST', body: JSON.stringify({ collectionId: col, items }) })
        .then(() => { log(ytUrls.length + ' YouTube URLs queued → ' + col, 'ok'); })
        .catch(e => { log('Error: ' + e.message, 'err'); });
    }

    // Web URLs
    if (webUrls.length && crawl) {
      for (const url of webUrls) {
        api('/ingest/crawl', { method: 'POST', body: JSON.stringify({ collectionId: col, url, maxPages }) })
          .then(() => { log('Crawl queued: ' + url.slice(0,50) + ' → ' + col, 'ok'); })
          .catch(e => { log('Crawl error: ' + e.message, 'err'); });
      }
    } else if (webUrls.length === 1) {
      api('/ingest', { method: 'POST', body: JSON.stringify({ collectionId: col, type: 'web', input: webUrls[0] }) })
        .then(() => { log('Web queued → ' + col, 'ok'); })
        .catch(e => { log('Error: ' + e.message, 'err'); });
    } else if (webUrls.length > 1) {
      const items = webUrls.map(u => ({ type: 'web', input: u }));
      api('/ingest/batch', { method: 'POST', body: JSON.stringify({ collectionId: col, items }) })
        .then(() => { log(webUrls.length + ' web URLs queued → ' + col, 'ok'); })
        .catch(e => { log('Error: ' + e.message, 'err'); });
    }
  }
  if (ytUrls.length + webUrls.length > 0) toast((ytUrls.length + webUrls.length) + ' URL(s) queued to ' + cols.length + ' collection(s)', 'success');
  document.getElementById('url-input').value = '';
}

function doChannelIngestNew() {
  const cols = getSelectedCollections();
  if (!cols.length) { toast('Select at least one collection', 'error'); return; }
  const url = val('channel-url');
  if (!url) { toast('Channel URL required', 'error'); return; }
  const max = parseInt(val('channel-max')) || 50;
  for (const col of cols) {
    api('/ingest/channel', { method: 'POST', body: JSON.stringify({ collectionId: col, channelUrl: url, maxVideos: max }) })
      .then(() => { log('Channel queued → ' + col, 'ok'); })
      .catch(e => { log('Channel error: ' + e.message, 'err'); });
  }
  toast('Channel ingest started to ' + cols.length + ' collection(s)', 'success');
}

function doTextIngestNew() {
  const cols = getSelectedCollections();
  if (!cols.length) { toast('Select at least one collection', 'error'); return; }
  const content = val('text-content'), title = val('text-title') || 'Pasted Text';
  if (!content) { toast('Enter some text', 'error'); return; }
  for (const col of cols) {
    api('/ingest', { method: 'POST', body: JSON.stringify({ collectionId: col, type: 'text', input: content, opts: { title } }) })
      .then(() => { log('Text queued: "' + title + '" → ' + col, 'ok'); })
      .catch(e => { log('Error: ' + e.message, 'err'); });
  }
  toast('Text queued to ' + cols.length + ' collection(s)', 'success');
  document.getElementById('text-content').value = '';
}

function doFileUpload() {
  const cols = getSelectedCollections();
  if (!cols.length) { toast('Select at least one collection', 'error'); return; }
  if (!selectedFiles.length) { toast('No files selected', 'error'); return; }
  const ctx = val('upload-ctx');
  for (const col of cols) {
    uploadFiles(col, selectedFiles, ctx);
  }
}

function doSearch() {
  const col = val('srch-col'), q = val('srch-q'), pers = val('srch-persona'), stage = val('srch-stage');
  if (!col || !q) { toast('Collection and query required', 'error'); return; }
  runSearch(col, q, pers, stage);
}

function doAsk() {
  const col = val('ask-col'), q = val('ask-q');
  if (!col || !q) { toast('Collection and question required', 'error'); return; }
  runAsk(col, q);
}

function submitNewCol() {
  const id = val('nc-id'), name = val('nc-name'), desc = val('nc-desc'), tpl = val('nc-tpl') || 'default';
  if (!id || !name) { toast('ID and name required', 'error'); return; }
  closeModal(); createCollection(id, name, desc, tpl);
}

function submitQuickIngest(colId) {
  const type = val('qi-type'), input = val('qi-input');
  if (!input) { toast('Input required', 'error'); return; }
  closeModal();
  log(`Ingesting ${type}: ${input.slice(0,60)}...`, 'info');
  api('/ingest', { method: 'POST', body: JSON.stringify({ collectionId: colId, type, input }) })
    .then(() => { log('Queued!', 'ok'); toast('Queued!', 'success'); setTimeout(() => loadCollection(colId), 3000); })
    .catch(e => { log(`Error: ${e.message}`, 'err'); toast('Failed', 'error'); });
}

async function saveKey() { KEY = val('key-inp'); localStorage.setItem('tde_key', KEY); try { const r = await fetch(API+'/admin/auth',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({key:KEY}),credentials:'same-origin'}); if(r.ok){toast('Authenticated! Cookie set.','success');loadAll();}else{toast('Invalid key','error');}} catch(e){toast('Auth failed: '+e.message,'error');}}

function go(v) { view = v; render(); }

function viewCol(id) {
  state.selectedCol = id; state.colDetail = null; state.colSources = [];
  view = 'detail'; render(); loadCollection(id);
}

function colCheckboxes(prefix) {
  if (!state.collections.length) return '<div style="color:var(--dim);font-size:12px">No collections yet</div>';
  return '<div class="col-checks" id="' + prefix + '-checks" style="display:flex;flex-wrap:wrap;gap:6px">' + state.collections.map(c => {
    const meta = c.metadata || {};
    const tpl = meta.template ? meta.template.name : (meta.templateId || '');
    return '<label style="display:flex;align-items:center;gap:4px;padding:4px 8px;background:var(--card);border:1px solid var(--border);border-radius:6px;font-size:12px;cursor:pointer"><input type="checkbox" name="' + prefix + '" value="' + c.id + '"> ' + esc(c.name) + (tpl ? ' <span style="color:var(--purple);font-size:10px">' + esc(tpl) + '</span>' : '') + '</label>';
  }).join('') + '</div>';
}

function getCheckedCols(prefix) {
  return Array.from(document.querySelectorAll('input[name="' + prefix + '"]:checked')).map(c => c.value);
}

function colSelect(id) {
  if (!state.collections.length) return `<select id="${id}"><option value="">No collections yet</option></select>`;
  return `<select id="${id}">${state.collections.map(c => `<option value="${c.id}">${esc(c.name)}</option>`).join('')}</select>`;
}

function dims(key) {
  const m = {
    persona: ['Executive/C-Suite','CFO/Finance','CISO/Security','CTO/IT','VP Sales','VP Marketing','Operations','Practitioner','End User','General'],
    buying_stage: ['Awareness','Interest','Evaluation','Decision','Retention','Advocacy'],
  };
  return m[key] || [];
}

function val(id) { const el = document.getElementById(id); return el ? el.value.trim() : ''; }
function esc(s) { if (!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

render();
loadAll();
</script>
</body>
</html>
